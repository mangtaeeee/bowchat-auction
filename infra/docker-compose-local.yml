services:
  postgres:
    image: postgres:16
    container_name: bowchat-postgres
    environment:
      POSTGRES_DB: bowchat
      POSTGRES_USER: bowchat
      POSTGRES_PASSWORD: bowchat123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: bowchat-redis
    command: ["redis-server", "--requirepass", "redis123"]
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    container_name: bowchat-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: bowchat
      MONGO_INITDB_ROOT_PASSWORD: bowchat123
      MONGO_INITDB_DATABASE: bowchat_chat
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bowchat-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bowchat-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  postgres_data:
  mongodb_data: