spring:
  application:
    name: user-service

  profiles:
    active: dev
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
---
spring:
  config:
    activate:
      on-profile: dev
  # user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/bowchat?currentSchema=user_service
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    show-sql: true
    properties:
      hibernate.default_batch_fetch_size: 50

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0

  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: ${KEYCLOAK_BROWSER_CLIENT_ID:bowchat-web}
            client-secret: ${KEYCLOAK_BROWSER_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
              - bowchat.user.claims
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:${OAUTH2_ISSUER_URI:}}
oauth2:
  internal-client:
    # Keycloak issuer, e.g. http://localhost:8080/realms/bowchat
    issuer-uri: ${OAUTH2_ISSUER_URI:}
    # Keycloak client id used for resource_access role mapping
    client-id: ${OAUTH2_INTERNAL_CLIENT_ID:}
    principal-attribute: ${OAUTH2_PRINCIPAL_ATTRIBUTE:preferred_username}

keycloak:
  auth:
    issuer-uri: ${KEYCLOAK_ISSUER_URI:${OAUTH2_ISSUER_URI:}}
    token-uri: ${KEYCLOAK_TOKEN_URI:}
    logout-uri: ${KEYCLOAK_LOGOUT_URI:}
    login-client-id: ${KEYCLOAK_LOGIN_CLIENT_ID:}
    login-client-secret: ${KEYCLOAK_LOGIN_CLIENT_SECRET:}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:}
    admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}

app:
  auth:
    local-password-login-enabled: ${APP_AUTH_LOCAL_PASSWORD_LOGIN_ENABLED:true}
  cors:
    allowed-origins:
      - http://localhost:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true

outbox:
  publish:
    fixed-delay-ms: 1000
    lock-at-least-for: 500ms
    lock-at-most-for: 10s

server:
  port: 8081

